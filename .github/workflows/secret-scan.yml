name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * *"

permissions:
  contents: read
  pull-requests: read
  security-events: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}