name: Build and release ZIP artifact

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set build metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV

      - name: Build ZIP
        run: |
          chmod +x scripts/make_release.sh
          VERSION="${VERSION}" BUILD_DATE="${BUILD_DATE}" ./scripts/make_release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: |
            out/*.zip
            out/*.sha256

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/*.zip out/*.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release build."
